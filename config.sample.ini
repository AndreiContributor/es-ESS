[DEFAULT]
devComment1 = Comments in this file have been omitted for 2 reasons:
devComment2 = 1 The config file is quite huge - without comments it stays somewhat readable.
devComment3 = On https://github.com/realdognose/esESS/blob/main/README.md youll find a full documentation.
devComment4 = 2 Version upgrades will automatically update existing config files - and this process will remove any comment anyway.

[Common]
LogLevel=APP_DEBUG
NumberOfThreads=5
ServiceMessageCount=20
ConfigVersion=8
VRMPortalID=xxxxxxxxxxxxxx
BatteryCapacityInWh=28000
BatteryMaxChargeInWh=9000
DefaultPowerSetPoint=0

[Mqtt]
Host=localhost
User=
Password=
Port=1883
SslEnabled=false
LocalSslEnabled=false

[Services]
SolarOverheadDistributor=false
TimeToGoCalculator=false
FroniusWattpilot=false
MqttExporter=false
MqttTemperature=false
# Must remain false when using battery-assist/no-grid EV control.
NoBatToEV=false
Shelly3EMGrid=false
ShellyPMInverter=false
Grid2Bat=false
FroniusSmartmeterJSON=false
MqttPVInverter=false

[MqttPvInverter]
EnableZeroFeedin=false
EnablePvShutdown=false
ZeroFeedinScaleStep=0.05
ZeroFeedinDistance=50
ZeroFeedinStartSoc=100

[NoBatToEV]
UseRelay=-1

[FroniusSmartmeterJSON]
VRMInstanceID=40
CustomName=Fronius Smartmeter (JSON)
PollFrequencyMs=500
Host=10.10.20.46
MeterID=0

[TimeToGoCalculator]
UpdateInterval=1000

[SolarOverheadDistributor]
VRMInstanceID=1000
VRMInstanceID_ReservationMonitor=1001
MinBatteryCharge=(5750/(min(SOC,99)-100)+5750)+250
# Five seconds is recommended for responsive EV allocation and cloud handling.
UpdateInterval=5000

[FroniusWattpilot]
VRMInstanceID=1007
VRMInstanceID_OverheadRequest=1006
MinPhaseSwitchSeconds=300
MinOnOffSeconds=300
OverheadPriority=35
ResetChargedEnergyCounter=OnDisconnect
Position=0
Host=10.10.20.47
Username=admin
Password=password
HibernateMode=false

# Explicit installation/car limits. The controller uses the lower of this
# setting and the Wattpilot-reported current limit.
MinCurrentPerPhase=6
MaxCurrentPerPhase=16

# PV-only thresholds for 1-phase <-> 3-phase transitions. These values do
# not include temporary battery-assist power.
ThreePhasePvSurplusStartW=4200
ThreePhasePvSurplusStopW=4140

# While the car is connected in Auto mode, redirect real PV that would
# otherwise charge the home battery to the EV. This does not authorise
# battery-assisted charging from a stopped state.
EvPriorityOverBatteryCharge=true
EvPriorityMinSoc=0

# Optional battery bridge for an already-running EV charge. It holds the
# current phase/current during a short PV dip; it never starts charging or
# causes a switch to 3 phases.
BatteryAssistEnabled=true
BatteryAssistSocMin=60
BatteryAssistMaxSeconds=300
BatteryAssistMaxShortfallW=3000

# Emergency grid-import stop guard. Set GridImportPositive=false only on a
# system where negative grid readings mean import.
AllowGridCharging=false
GridImportPositive=true
GridImportStopW=150
GridImportStopSeconds=5

AllowanceDropGraceSeconds = 15
CarDisconnectConfirmSeconds = 15
SurplusDropGraceSeconds = 20
StartupGraceSeconds=60
StartupTelemetryRatio=0.80